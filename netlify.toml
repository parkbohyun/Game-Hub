[build]
  command = "bash build.sh"
  publish = "."

# -----------------------------
# Redirects
# -----------------------------

# /index.html 로 접근해도 루트(/)로 정규화
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/index"
  to = "/"
  status = 301
  force = true

# ===== Pretty URL: /games/<game> → /games/<game>/<game>.html =====
