<body>
  <div class="container">
    <div class="card">
      <div class="topbar">
        <h1 style="margin:0; font-weight:900; font-size:1.8rem; color:var(--text-color);">GAME HUB</h1>
        <div class="row">
          <div class="badge" id="user-badge" style="margin-right:8px;">세션 준비 중...</div>
          <button class="secondary inline" onclick="goSettings()">설정</button>
          <button class="secondary inline" onclick="goMember()">계정</button>
          <button class="secondary inline" onclick="logout()">로그아웃</button>
        </div>
      </div>

      <div class="warn" id="score-warn" style="display: none;">
        게스트(비로그인) 상태입니다. 점수가 저장되지 않습니다.
      </div>

      <div class="divider"></div>

      <div class="menu-container">
        <a href="games/sudoku/sudoku.html" class="game-card">
          <div style="font-size: 2.5rem; margin-bottom: 10px;">🔢</div>
          Sudoku
        </a>
        <a href="games/2048/2048.html" class="game-card">
          <div style="font-size: 2.5rem; margin-bottom: 10px;">🔳</div>
          2048
        </a>
        <a href="games/maze-eater/maze-eater.html" class="game-card">
          <div style="font-size: 2.5rem; margin-bottom: 10px;">👻</div>
          Maze Eater
        </a>
        <a href="games/merge-fruit/merge-fruit.html" class="game-card">
          <div style="font-size: 2.5rem; margin-bottom: 10px;">🍉</div>
          Merge Fruit
        </a>
        <a href="games/blockblast/blockblast.html" class="game-card">
          <div style="font-size: 2.5rem; margin-bottom: 10px;">🧱</div>
          Block Blast
        </a>
        <a href="games/dino/dino.html" class="game-card">
          <div style="font-size: 2.5rem; margin-bottom: 10px;">🦖</div>
          Chrome Dino
        </a>
        <a href="games/minesweeper/minesweeper.html" class="game-card">
          <div style="font-size: 2.5rem; margin-bottom: 10px;">💣</div>
          Minesweeper
        </a>
        <a href="games/apple/apple.html" class="game-card">
          <div style="font-size: 2.5rem; margin-bottom: 10px;">🍎</div>
          Apple
        </a>
      </div>

      <div class="leaderboard">
        <h2 style="margin-top:0;">🏆 명예의 전당 (Top 5)</h2>
        <div class="tabs">
          <button class="tab-btn active" onclick="loadSudokuScores()">Sudoku</button>
          <button class="tab-btn" onclick="load2048Scores()">2048</button>
          <button class="tab-btn" onclick="loadMazeEaterScores()">Maze Eater</button>
          <button class="tab-btn" onclick="loadMergeFruitScores()">Merge</button>
          <button class="tab-btn" onclick="loadBlockBlastScores()">Block</button>
          <button class="tab-btn" onclick="loadAppleScores()">Apple</button>
          <button class="tab-btn" onclick="loadDinoScores()">Dino</button>
          <button class="tab-btn" onclick="loadMinesweeperScores()">Mine</button>
        </div>

        <div id="score-content" style="margin-top: 20px;">
          <table>
            <thead>
              <tr>
                <th>순위</th>
                <th>ID</th>
                <th>기록/점수</th>
                <th>상세</th>
              </tr>
            </thead>
            <tbody id="score-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
